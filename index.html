<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wedding Gallery</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body{
 margin:0;
 font-family:'Inter',sans-serif;
 overflow:hidden;
}

/* HERO BACKGROUND */
.hero{
 position:fixed;
 width:100%;
 height:100%;
 background:url('https://images.unsplash.com/photo-1519741497674-611481863552?q=80&w=1920') center/cover no-repeat;
 filter:brightness(0.5);
 z-index:-1;
}

/* CONTENT */
.container{
 height:100vh;
 display:flex;
 justify-content:center;
 align-items:center;
 flex-direction:column;
 text-align:center;
 color:white;
 animation:fadeUp 1.5s ease;
}

/* ANIMATION */
@keyframes fadeUp{
 from{opacity:0; transform:translateY(50px);}
 to{opacity:1; transform:translateY(0);}
}

/* ADMIN */
#admin input{
 padding:12px;
 margin:10px;
 width:260px;
 border-radius:10px;
 border:none;
}

#admin button{
 padding:12px;
 width:260px;
 border:none;
 border-radius:30px;
 background:linear-gradient(45deg,#d4af37,#f5e6a3);
 font-weight:bold;
 cursor:pointer;
 transition:0.3s;
}

#admin button:hover{
 transform:scale(1.05);
}

/* VIEW */
#viewer{
 display:none;
}

h1{
 font-family:'Playfair Display';
 font-size:3em;
 letter-spacing:3px;
 margin:0;
}

p{
 margin-top:10px;
 color:#ddd;
}

/* BUTTONS */
.btn{
 margin-top:20px;
 padding:15px 30px;
 border:none;
 border-radius:50px;
 background:linear-gradient(45deg,#d4af37,#f5e6a3);
 color:black;
 font-size:16px;
 cursor:pointer;
 transition:0.3s;
}

.btn:hover{
 transform:scale(1.1);
 box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* QR */
.qr{
 margin-top:30px;
}
.qr img{
 width:160px;
 background:white;
 padding:10px;
 border-radius:10px;
}
</style>

</head>

<body>

<div class="hero"></div>

<!-- ADMIN -->
<div id="admin" class="container">
<h2>Create Wedding Page 💍</h2>

<input id="name" placeholder="Bride & Groom Name"><br>
<input id="event" placeholder="Wedding Day"><br>
<input id="drive" placeholder="Main Gallery Drive Link"><br>
<input id="upload" placeholder="Guest Upload Link (optional)"><br>

<button onclick="generate()">Generate Cinematic Link</button>

<h3 id="output"></h3>
</div>

<!-- VIEW -->
<div id="viewer" class="container">
<h1 id="title"></h1>
<p id="eventText"></p>

<button class="btn" id="openBtn">View Gallery</button>
<button class="btn" id="uploadBtn">Upload Your Photos</button>

<div class="qr">
<img id="qrImg">
</div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const driveParam = params.get("drive");

// VIEW MODE
if(driveParam && driveParam !== ""){
 document.getElementById("admin").style.display="none";
 document.getElementById("viewer").style.display="flex";

 const name=params.get("name");
 const event=params.get("event");
 const drive=driveParam;
 const upload=params.get("upload");

 document.getElementById("title").innerText = decodeURIComponent(name || "Wedding Gallery");
 document.getElementById("eventText").innerText = decodeURIComponent(event || "");

 document.getElementById("openBtn").onclick = ()=>{
  window.open(decodeURIComponent(drive),"_blank");
 };

 if(upload){
  document.getElementById("uploadBtn").onclick = ()=>{
   window.open(decodeURIComponent(upload),"_blank");
  };
 } else {
  document.getElementById("uploadBtn").style.display="none";
 }

 document.getElementById("qrImg").src =
 `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${drive}`;
}

// GENERATE LINK
function generate(){
 const name=document.getElementById("name").value.trim();
 const event=document.getElementById("event").value.trim();
 const drive=document.getElementById("drive").value.trim();
 const upload=document.getElementById("upload").value.trim();

 if(!name || !drive){
  alert("Fill required fields");
  return;
 }

 const base=window.location.origin + window.location.pathname;

 let link=`${base}?name=${encodeURIComponent(name)}&event=${encodeURIComponent(event)}&drive=${encodeURIComponent(drive)}`;

 if(upload){
  link+=`&upload=${encodeURIComponent(upload)}`;
 }

 document.getElementById("output").innerText=link;
}
</script>

</body>
</html>
