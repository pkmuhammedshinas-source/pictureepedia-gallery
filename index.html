<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wedding Experience</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter&display=swap" rel="stylesheet">

<style>
body{
 margin:0;
 font-family:'Inter',sans-serif;
 overflow-x:hidden;
 animation:fadePage 1.2s ease;
}

@keyframes fadePage{
 from{opacity:0}
 to{opacity:1}
}

.hero{
 position:fixed;
 width:100%;
 height:100%;
 background:url('https://images.unsplash.com/photo-1519741497674-611481863552?q=80&w=1920') center/cover no-repeat;
 filter:brightness(0.5);
 z-index:-1;
 animation:zoomBg 20s ease-in-out infinite alternate;
}

@keyframes zoomBg{
 from{transform:scale(1)}
 to{transform:scale(1.08)}
}

.glass{
 backdrop-filter:blur(15px);
 background:rgba(255,255,255,0.08);
 border:1px solid rgba(255,255,255,0.2);
 border-radius:20px;
 padding:30px;
 box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

.container{
 height:100vh;
 display:flex;
 justify-content:center;
 align-items:center;
 text-align:center;
 color:white;
}

h1{
 font-family:'Playfair Display';
 font-size:2.8em;
 margin:0;
}

p{
 color:#ddd;
}

.btn{
 margin-top:12px;
 padding:12px 25px;
 border:none;
 border-radius:50px;
 background:linear-gradient(45deg,#d4af37,#f5e6a3);
 cursor:pointer;
 transition:0.3s;
}

.btn:hover{
 transform:scale(1.05);
 box-shadow:0 10px 25px rgba(212,175,55,0.3);
}

#admin input{
 padding:12px;
 margin:8px;
 width:250px;
 border-radius:10px;
 border:none;
}

#viewer{
 display:none;
}

.qr img{
 width:130px;
 margin-top:15px;
 background:white;
 padding:6px;
 border-radius:8px;
}
</style>
</head>

<body>

<div class="hero"></div>

<!-- ADMIN -->
<div id="admin" class="container">
<div class="glass">
<h2>Create Wedding Experience 💍</h2>

<input id="name" placeholder="Bride & Groom Name"><br>
<input id="event" placeholder="Wedding Day"><br>
<input id="drive" placeholder="Main Gallery Drive Link"><br>
<input id="upload" placeholder="Guest Upload Link"><br>

<button class="btn" onclick="generate()">Generate Link</button>

<h3 id="output"></h3>

<img id="adminQR" style="margin-top:10px; width:140px;">
</div>
</div>

<!-- VIEW -->
<div id="viewer" class="container">
<div class="glass">
<h1 id="title"></h1>
<p id="eventText"></p>

<button class="btn" id="driveBtn">View Gallery</button>
<button class="btn" id="uploadBtn">Upload Photos</button>

<div class="qr">
<img id="qrImg">
</div>
</div>
</div>

<script>
const params=new URLSearchParams(window.location.search);
const drive=params.get("drive");

if(drive){
 document.getElementById("admin").style.display="none";
 document.getElementById("viewer").style.display="flex";

 const name=params.get("name");
 const event=params.get("event");
 const upload=params.get("upload");

 document.getElementById("title").innerText=name||"Wedding";
 document.getElementById("eventText").innerText=event||"";

 document.getElementById("driveBtn").onclick=()=>{
  window.open(decodeURIComponent(drive),"_blank");
 };

 if(upload){
  document.getElementById("uploadBtn").onclick=()=>{
   window.open(decodeURIComponent(upload),"_blank");
  };
 } else {
  document.getElementById("uploadBtn").style.display="none";
 }

 const fullLink = window.location.href;

 document.getElementById("qrImg").src =
 `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(fullLink)}`;
}

// GENERATE
function generate(){
 const name=document.getElementById("name").value.trim();
 const event=document.getElementById("event").value.trim();
 const drive=document.getElementById("drive").value.trim();
 const upload=document.getElementById("upload").value.trim();

 if(!name || !drive){
  alert("Fill required fields");
  return;
 }

 const base=window.location.origin+window.location.pathname;

 let link=`${base}?name=${encodeURIComponent(name)}&event=${encodeURIComponent(event)}&drive=${encodeURIComponent(drive)}`;

 if(upload){
  link+=`&upload=${encodeURIComponent(upload)}`;
 }

 document.getElementById("output").innerText=link;

 document.getElementById("adminQR").src =
 `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(link)}`;
}
</script>

</body>
</html>
