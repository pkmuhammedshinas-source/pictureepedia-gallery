<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wedding Experience</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter&display=swap" rel="stylesheet">

<style>
body{
 margin:0;
 font-family:'Inter',sans-serif;
 background:#0f0f0f;
 color:white;
}

/* HERO */
.hero{
 height:100vh;
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
 text-align:center;
 background:radial-gradient(circle,#1a1a1a,#000);
 animation:fade 1s ease;
}

@keyframes fade{
 from{opacity:0; transform:translateY(30px);}
 to{opacity:1; transform:translateY(0);}
}

h1{
 font-family:'Playfair Display';
 font-size:3em;
 margin:0;
}

p{
 color:#aaa;
}

/* BUTTONS */
.btn{
 margin-top:12px;
 padding:12px 24px;
 border:none;
 border-radius:50px;
 background:linear-gradient(45deg,#d4af37,#f5e6a3);
 color:black;
 cursor:pointer;
 transition:0.3s;
}

.btn:hover{
 transform:scale(1.07);
 box-shadow:0 10px 25px rgba(212,175,55,0.3);
}

/* ADMIN */
#admin{
 padding:40px;
 text-align:center;
}

input{
 padding:10px;
 margin:8px;
 width:250px;
 border-radius:8px;
 border:none;
}

/* ACTION PANEL */
.panel{
 margin-top:20px;
 display:flex;
 flex-direction:column;
 gap:10px;
}

/* GALLERY */
#gallery{
 display:none;
 background:#fff;
 color:black;
 padding:20px;
}

.grid{
 display:grid;
 grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
 gap:10px;
}

.grid img{
 width:100%;
 border-radius:10px;
 cursor:pointer;
 transition:0.3s;
}

.grid img:hover{
 transform:scale(1.05);
}

/* MODAL */
.modal{
 display:none;
 position:fixed;
 top:0;left:0;
 width:100%;height:100%;
 background:rgba(0,0,0,0.9);
 justify-content:center;
 align-items:center;
}

.modal img{
 max-width:90%;
 max-height:90%;
}

/* QR */
.qr img{
 width:120px;
 margin-top:15px;
 background:white;
 padding:6px;
 border-radius:8px;
}
</style>
</head>

<body>

<!-- ADMIN -->
<div id="admin">
<h2>Create Wedding Page 💍</h2>

<input id="name" placeholder="Bride & Groom Name"><br>
<input id="event" placeholder="Wedding Day"><br>
<input id="drive" placeholder="Main Drive Link"><br>
<input id="upload" placeholder="Guest Upload Link"><br>

<button class="btn" onclick="generate()">Generate Link</button>

<h3 id="output"></h3>
</div>

<!-- HERO VIEW -->
<div id="viewer" class="hero" style="display:none;">
<h1 id="title"></h1>
<p id="eventText"></p>

<div class="panel">
<button class="btn" onclick="enter()">Enter Gallery</button>
<button class="btn" id="driveBtn">Open Full Gallery</button>
<button class="btn" id="uploadBtn">Upload Your Photos</button>
<button class="btn" onclick="copyLink()">Copy Link</button>
</div>

<div class="qr">
<img id="qrImg">
</div>
</div>

<!-- GALLERY -->
<div id="gallery">
<h2>Gallery</h2>
<div class="grid" id="grid"></div>
</div>

<!-- MODAL -->
<div class="modal" id="modal" onclick="this.style.display='none'">
<img id="modalImg">
</div>

<script>
const params=new URLSearchParams(window.location.search);
const drive=params.get("drive");

if(drive){
 document.getElementById("admin").style.display="none";
 document.getElementById("viewer").style.display="flex";

 const name=params.get("name");
 const event=params.get("event");
 const upload=params.get("upload");

 document.getElementById("title").innerText=name||"Wedding";
 document.getElementById("eventText").innerText=event||"";

 document.getElementById("driveBtn").onclick=()=>{
  window.open(decodeURIComponent(drive),"_blank");
 };

 if(upload){
  document.getElementById("uploadBtn").onclick=()=>{
   window.open(decodeURIComponent(upload),"_blank");
  };
 } else {
  document.getElementById("uploadBtn").style.display="none";
 }

 document.getElementById("qrImg").src=
 `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${drive}`;
}

function enter(){
 document.getElementById("viewer").style.display="none";
 document.getElementById("gallery").style.display="block";
}

// SAMPLE IMAGES
const images=[
 "https://picsum.photos/400/500?1",
 "https://picsum.photos/400/500?2",
 "https://picsum.photos/400/500?3"
];

const grid=document.getElementById("grid");

images.forEach(src=>{
 let img=document.createElement("img");
 img.src=src;

 img.onclick=()=>{
  document.getElementById("modal").style.display="flex";
  document.getElementById("modalImg").src=src;
 };

 grid.appendChild(img);
});

// COPY LINK
function copyLink(){
 navigator.clipboard.writeText(window.location.href);
 alert("Link copied!");
}

// GENERATE
function generate(){
 const name=document.getElementById("name").value.trim();
 const event=document.getElementById("event").value.trim();
 const drive=document.getElementById("drive").value.trim();
 const upload=document.getElementById("upload").value.trim();

 if(!name || !drive){
  alert("Fill required fields");
  return;
 }

 const base=window.location.origin+window.location.pathname;

 let link=`${base}?name=${encodeURIComponent(name)}&event=${encodeURIComponent(event)}&drive=${encodeURIComponent(drive)}`;

 if(upload){
  link+=`&upload=${encodeURIComponent(upload)}`;
 }

 document.getElementById("output").innerText=link;
}
</script>

</body>
</html>
