<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wedding Experience</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter&display=swap" rel="stylesheet">

<style>
body{
 margin:0;
 font-family:'Inter',sans-serif;
 background:#0f0f0f;
 color:white;
}

/* HERO */
.hero{
 height:100vh;
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
 text-align:center;
 background:radial-gradient(circle,#1a1a1a,#000);
 background-size:cover;
 background-position:center;
}

h1{
 font-family:'Playfair Display';
 font-size:3em;
}

p{color:#aaa}

/* INPUT */
input{
 padding:10px;
 margin:8px;
 width:250px;
 border-radius:8px;
 border:none;
}

/* BUTTON */
.btn{
 padding:12px 24px;
 margin:8px;
 border:none;
 border-radius:50px;
 background:linear-gradient(45deg,#d4af37,#f5e6a3);
 color:black;
 cursor:pointer;
}

/* GALLERY */
#gallery{
 display:none;
 background:#fff;
 color:black;
 padding:20px;
}

.grid{
 display:grid;
 grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
 gap:10px;
}

.grid img{
 width:100%;
 border-radius:10px;
 cursor:pointer;
}

/* QR */
.qr img{
 width:120px;
 margin-top:10px;
 background:white;
 padding:6px;
 border-radius:8px;
}
</style>
</head>

<body>

<!-- ADMIN -->
<div id="admin">
<h2>Create Wedding Page 💍</h2>

<input id="name" placeholder="Bride & Groom"><br>
<input id="event" placeholder="Event"><br>
<input id="drive" placeholder="Drive Link"><br>
<input id="upload" placeholder="Upload Link"><br>

<input type="file" id="bgUpload"><br>

<button class="btn" onclick="generate()">Generate Link</button>

<h3 id="output"></h3>
</div>

<!-- VIEW -->
<div id="viewer" class="hero" style="display:none;">
<h1 id="title"></h1>
<p id="eventText"></p>

<button class="btn" onclick="enter()">Enter Gallery</button>
<button class="btn" id="driveBtn">Open Drive</button>
<button class="btn" id="uploadBtn">Upload Photos</button>

<div class="qr">
<img id="qrImg">
</div>
</div>

<!-- GALLERY -->
<div id="gallery">
<div class="grid" id="grid"></div>
</div>

<script>
const params=new URLSearchParams(window.location.search);
const drive=params.get("drive");

// APPLY BACKGROUND FROM URL
const bg=params.get("bg");
if(bg){
 document.querySelector(".hero").style.backgroundImage=`url(${bg})`;
}

// VIEW MODE
if(drive){
 document.getElementById("admin").style.display="none";
 document.getElementById("viewer").style.display="flex";

 const name=params.get("name");
 const event=params.get("event");
 const upload=params.get("upload");

 document.getElementById("title").innerText=name;
 document.getElementById("eventText").innerText=event;

 document.getElementById("driveBtn").onclick=()=>{
  window.open(decodeURIComponent(drive),"_blank");
 };

 if(upload){
  document.getElementById("uploadBtn").onclick=()=>{
   window.open(decodeURIComponent(upload),"_blank");
  };
 }
}

// ENTER GALLERY
function enter(){
 document.getElementById("viewer").style.display="none";
 document.getElementById("gallery").style.display="block";
}

// SAMPLE IMAGES
const images=[
 "https://picsum.photos/400/500?1",
 "https://picsum.photos/400/500?2"
];

images.forEach(src=>{
 let img=document.createElement("img");
 img.src=src;
 document.getElementById("grid").appendChild(img);
});

// GENERATE LINK
function generate(){
 const name=document.getElementById("name").value;
 const event=document.getElementById("event").value;
 const drive=document.getElementById("drive").value;
 const upload=document.getElementById("upload").value;
 const file=document.getElementById("bgUpload").files[0];

 let base=window.location.origin+window.location.pathname;

 if(file){
  const reader=new FileReader();
  reader.onload=function(){
   createLink(reader.result);
  };
  reader.readAsDataURL(file);
 } else {
  createLink("");
 }

 function createLink(bg){
  let link=`${base}?name=${encodeURIComponent(name)}&event=${encodeURIComponent(event)}&drive=${encodeURIComponent(drive)}`;

  if(upload) link+=`&upload=${encodeURIComponent(upload)}`;
  if(bg) link+=`&bg=${encodeURIComponent(bg)}`;

  document.getElementById("output").innerText=link;
 }
}
</script>

</body>
</html>
